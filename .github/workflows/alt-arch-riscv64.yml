name: Alt Arch Riscv64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Tempo (riscv64)
    runs-on: ubuntu-24.04-riscv
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Build
        run: |
          go version
          time go build -v ./cmd/tempo/

      - name: Verify
        run: |
          ./tempo --version
          file ./tempo
